
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --accent-color: #00d2ff;
      --text-color: #ffffff;
      --secondary-text: #8b949e;
      --button-bg: #0084ff;
      --button-hover: #0073e6;
      --border-color: #30363d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 350px;
      min-height: 450px;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* License Screen */
    #license-screen {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: center;
      padding-top: 40px;
    }

    /* Main Screen */
    #main-screen {
      display: none;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .tiktok-btn {
      background-color: #2c2c2c;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s;
    }

    .tiktok-btn:hover {
      background-color: #3d3d3d;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent-color);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 12px;
      color: var(--secondary-text);
      margin-top: -10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
      width: 100%;
    }

    .input-group label {
      font-size: 14px;
      color: var(--text-color);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      color: white;
      font-size: 14px;
    }

    .buy-btn {
      color: var(--accent-color);
      text-decoration: none;
      font-size: 13px;
      margin-top: 5px;
    }

    /* Drag & Drop Area */
    .upload-area {
      width: 100%;
      height: 120px;
      border: 2px dashed var(--accent-color);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(0, 210, 255, 0.05);
      cursor: pointer;
      transition: all 0.3s;
      padding: 10px;
      text-align: center;
    }

    .upload-area:hover, .upload-area.dragover {
      background-color: rgba(0, 210, 255, 0.1);
      border-color: #ffffff;
    }

    .upload-area p {
      font-size: 13px;
      color: var(--secondary-text);
    }

    .upload-area .file-name {
      color: var(--accent-color);
      font-weight: bold;
      margin-top: 5px;
      word-break: break-all;
    }

    /* Action Button */
    .primary-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background-color: var(--button-bg);
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }

    .primary-btn:hover {
      background-color: var(--button-hover);
    }

    .primary-btn:disabled {
      background-color: #444;
      cursor: not-allowed;
      color: #888;
    }

    #status {
      font-size: 12px;
      color: var(--secondary-text);
      text-align: center;
      margin-top: 5px;
    }

    .error-msg {
      color: #ff4d4d;
      font-size: 12px;
      display: none;
    }

    #fileInput {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- License Verification Screen -->
    <div id="license-screen">
      <h1>TOP EDIT SUITE</h1>
      <p class="subtitle">Professional Video Processing</p>
      
      <div class="input-group">
        <label>Enter License Key</label>
        <input type="text" id="licenseKey" placeholder="XXXX-XXXX-XXXX">
        <p id="licenseError" class="error-msg">Invalid License Key</p>
      </div>

      <button id="verifyBtn" class="primary-btn">Verify License</button>
      <a href="https://payhip.com/b/LkZpy" target="_blank" class="buy-btn">Buy License Key</a>
    </div>

    <!-- Main Processing Screen -->
    <div id="main-screen">
      <a href="https://www.tiktok.com/@topedit.aep" target="_blank" class="tiktok-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.89-.6-4.13-1.47-.13-.08-.26-.17-.38-.26v7.02c0 3.11-1.8 5.83-4.58 7.07-2.78 1.24-6.13.88-8.56-1.04-2.43-1.92-3.48-5.11-2.61-8.08.87-2.97 3.55-5.06 6.63-5.06.14 0 .28 0 .42.01v4.03c-1.34-.1-2.72.35-3.61 1.34-1.08 1.21-1.2 3.08-.3 4.41.9 1.33 2.62 1.88 4.11 1.34 1.49-.54 2.37-2.12 2.31-3.7-.02-2.16-.01-4.32-.01-6.48 0-1.61-.01-3.22-.01-4.83z"/></svg>
        Follow on TikTok
      </a>

      <h1>TOP EDIT SUITE</h1>
      <p class="subtitle">Professional Video Processing - V5 Anti-Compression Patch</p>

      <div class="input-group">
        <label>Upload Video File</label>
        <div class="upload-area" id="dropZone">
          <p id="dropText">Click here to select a video from your device</p>
          <p class="file-name" id="selectedFileName"></p>
        </div>
        <input type="file" id="fileInput" accept="video/*">
      </div>

      <button id="patchBtn" class="primary-btn" disabled>Apply V5 Patch & Download</button>
      <div id="status">Ready</div>
    </div>
  </div>

  <script src="keys.js"></script>
  <script src="popup.js"></script>
</body>
</html>
