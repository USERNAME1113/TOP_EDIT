<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP EDIT SUITE - פאנל רישיונות</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #06080c;
            --card-bg: rgba(12, 16, 24, 0.7);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd5eff;
            --accent-green: #00ffaa;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-family: 'Outfit', sans-serif;
            --glow-cyan: 0 0 15px rgba(0, 242, 255, 0.25);
            --glow-purple: 0 0 15px rgba(189, 94, 255, 0.25);
            --glow-green: 0 0 15px rgba(0, 255, 170, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            transition: all 0.2s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px;
            overflow-x: hidden;
            position: relative;
        }

        /* Video Background */
        .video-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
            background: #000;
        }

        .video-bg-container iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16/9 = 1.777 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: linear-gradient(135deg, rgba(6, 8, 12, 0.88) 0%, rgba(12, 5, 20, 0.93) 100%);
            backdrop-filter: blur(6px);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 400;
        }

        /* Stats cards grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-glow {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
            top: -30px;
            right: -30px;
        }

        .stat-card.total .card-glow { background: var(--accent-cyan); }
        .stat-card.distributed .card-glow { background: var(--accent-purple); }
        .stat-card.remaining .card-glow { background: var(--accent-green); }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.08);
        }

        .stat-card.total:hover { box-shadow: var(--glow-cyan); }
        .stat-card.distributed:hover { box-shadow: var(--glow-purple); }
        .stat-card.remaining:hover { box-shadow: var(--glow-green); }

        .stat-card h3 {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 5px;
            font-family: 'Montserrat', sans-serif;
        }

        .stat-card.total .stat-value { color: var(--accent-cyan); }
        .stat-card.distributed .stat-value { color: var(--accent-purple); }
        .stat-card.remaining .stat-value { color: var(--accent-green); }

        .stat-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Filter & search section */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 300px;
        }

        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
        }

        #searchInput {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 15px 45px 15px 20px;
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
        }

        #searchInput:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.15);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 6px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        .filter-btn:hover {
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-cyan);
            color: #06080c;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
            font-weight: 800;
        }

        /* Table container */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .keys-table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        .keys-table th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-transform: uppercase;
        }

        .keys-table td {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
            vertical-align: middle;
        }

        .keys-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .key-code {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            font-size: 14px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.available {
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid rgba(0, 255, 170, 0.2);
            color: var(--accent-green);
        }

        .badge.distributed {
            background: rgba(189, 94, 255, 0.1);
            border: 1px solid rgba(189, 94, 255, 0.2);
            color: var(--accent-purple);
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-color: rgba(255,255,255,0.15);
        }

        .btn-action.copy-btn:hover {
            color: var(--accent-cyan);
            border-color: rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .btn-action.reset-btn:hover {
            color: var(--accent-purple);
            border-color: rgba(189, 94, 255, 0.3);
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 12px;
            opacity: 0.6;
        }

        .no-results {
            text-align: center;
            padding: 50px 0 !important;
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(12, 16, 24, 0.95);
            border: 1px solid var(--accent-cyan);
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--glow-cyan);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Top control header */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .reset-all-btn {
            background: rgba(255, 71, 126, 0.05);
            border: 1px solid rgba(255, 71, 126, 0.15);
            color: var(--accent-red);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            color: #ff477e;
        }

        .reset-all-btn:hover {
            background: rgba(255, 71, 126, 0.15);
            box-shadow: 0 0 10px rgba(255, 71, 126, 0.1);
        }
    </style>
</head>

        let distributedKeys = new Set();
        let currentFilter = 'all';
        let searchQuery = '';

        const tbody = document.getElementById('keys-tbody');
        const searchInput = document.getElementById('searchInput');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const toast = document.getElementById('toast');
        const resetAllBtn = document.getElementById('resetAllBtn');

        const statTotal = document.getElementById('stat-total');
        const statDistributed = document.getElementById('stat-distributed');
        const statRemaining = document.getElementById('stat-remaining');

        // Load distributed keys from localStorage
        function loadStorage() {
            try {
                const stored = localStorage.getItem('top_edit_distributed_keys');
                if (stored) {
                    distributedKeys = new Set(JSON.parse(stored));
                }
            } catch(e) {
                console.error("Failed to load local storage", e);
            }
        }

        // Save distributed keys to localStorage
        function saveStorage() {
            try {
                localStorage.setItem('top_edit_distributed_keys', JSON.stringify([...distributedKeys]));
            } catch(e) {
                console.error("Failed to save local storage", e);
            }
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function updateStats() {
            const total = KEYS.length;
            const dist = distributedKeys.size;
            const rem = total - dist;

            statTotal.textContent = total;
            statDistributed.textContent = dist;
            statRemaining.textContent = rem;
        }

        function renderKeysTable() {
            let filtered = KEYS.map((key, index) => ({ key, index: index + 1 }));

            // Apply filter
            if (currentFilter === 'free') {
                filtered = filtered.filter(item => !distributedKeys.has(item.key));
            } else if (currentFilter === 'distributed') {
                filtered = filtered.filter(item => distributedKeys.has(item.key));
            }

            // Apply search
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(item => item.key.toLowerCase().includes(query));
            }

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="no-results">לא נמצאו מפתחות התואמים את הסינון.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(item => {
                const isDist = distributedKeys.has(item.key);
                const badge = isDist 
                    ? '<span class="badge distributed">חולק ללקוח</span>' 
                    : '<span class="badge available">פנוי לחלוקה</span>';

                return `
                    <tr>
                        <td style="text-align: center; color: var(--text-secondary); font-weight: 600;">${item.index}</td>
                        <td>
                            <span class="key-code">${item.key}</span>
                        </td>
                        <td>${badge}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-action copy-btn" onclick="copyKey('${item.key}')">📋 העתק מפתח</button>
                                ${isDist ? `<button class="btn-action reset-btn" onclick="resetKey('${item.key}')">🔄 בטל חלוקה</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.copyKey = function(key) {
            navigator.clipboard.writeText(key).then(() => {
                distributedKeys.add(key);
                saveStorage();
                updateStats();
                renderKeysTable();
                showToast('מפתח הרישיון הועתק ללוח וסומן כ"חולק"!');
            }).catch(err => {
                console.error("Failed to copy", err);
            });
        };

        window.resetKey = function(key) {
            distributedKeys.delete(key);
            saveStorage();
            updateStats();
            renderKeysTable();
            showToast('סטטוס המפתח הוחזר ל"פנוי לחלוקה"!');
        };

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderKeysTable();
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderKeysTable();
            });
        });

        resetAllBtn.addEventListener('click', () => {
            if (confirm('האם אתה בטוח שברצונך לאפס את כל מעקב החלוקה?
כל המפתחות יחזרו למצב "פנוי לחלוקה".')) {
                distributedKeys.clear();
                saveStorage();
                updateStats();
                renderKeysTable();
                showToast('כל המפתחות הוחזרו למצב פנוי!');
            }
        });

        // Initialize
        loadStorage();
        updateStats();
        renderKeysTable();
    });
    </script>
