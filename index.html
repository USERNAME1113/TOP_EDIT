<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP EDIT SUITE - License Admin Dashboard (Firebase)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header with Deep Glow Neon Logo */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            border-bottom: 2px solid rgba(0, 255, 255, 0.3);
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-text {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffff, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 100px;
            background: radial-gradient(ellipse at center, rgba(0, 255, 255, 0.4) 0%, rgba(0, 255, 255, 0.1) 40%, transparent 70%);
            filter: blur(30px);
            z-index: 1;
            animation: glowExpand 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.4);
            }
            50% {
                text-shadow: 0 0 30px rgba(0, 255, 255, 1), 0 0 60px rgba(0, 255, 255, 0.6);
            }
        }

        @keyframes glowExpand {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.4;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.6;
            }
        }

        .subtitle {
            color: #00ffff;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .firebase-status {
            display: inline-block;
            margin-left: 20px;
            padding: 8px 16px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 20px;
            color: #00ff00;
            font-size: 12px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Authentication Section */
        .auth-section {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-section.active {
            display: flex;
        }

        .auth-box {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1428 100%);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .auth-box h2 {
            color: #00ffff;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            color: #00ffff;
            font-size: 14px;
        }

        .auth-input::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }

        .auth-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00ffff, #00ccff);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .auth-button:hover {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            transform: scale(1.02);
        }

        .auth-error {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }

        /* Main Dashboard */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        /* Control Panel */
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-card {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.05) 0%, rgba(0, 150, 150, 0.05) 100%);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
        }

        .control-card h3 {
            color: #00ffff;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-field {
            flex: 1;
            padding: 10px;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #00ffff, #00ccff);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .button:hover {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .button:active {
            transform: scale(0.98);
        }

        .button.danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
        }

        .button.danger:hover {
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
        }

        .button.logout {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ff6464;
            padding: 8px 16px;
            font-size: 11px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #00ffff;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: rgba(0, 255, 255, 0.4);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Search and Filter */
        .search-filter {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-filter input,
        .search-filter select {
            padding: 10px;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 12px;
        }

        /* Keys Table */
        .keys-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            overflow-x: auto;
            display: block;
        }

        .keys-table thead {
            background: rgba(0, 255, 255, 0.1);
            border-bottom: 2px solid rgba(0, 255, 255, 0.3);
            display: table;
            width: 100%;
        }

        .keys-table th {
            padding: 15px;
            text-align: left;
            color: #00ffff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .keys-table tbody {
            display: block;
            max-height: 600px;
            overflow-y: auto;
        }

        .keys-table tbody tr {
            display: table;
            width: 100%;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }

        .keys-table tbody tr:hover {
            background: rgba(0, 255, 255, 0.05);
        }

        .keys-table td {
            padding: 12px 15px;
            font-size: 12px;
        }

        .key-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-active {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 1px solid rgba(0, 255, 0, 0.3);
        }

        .status-revoked {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .key-value {
            font-family: 'Courier New', monospace;
            color: #00ffff;
            word-break: break-all;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            padding: 6px 12px;
            font-size: 11px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .copy-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }

        .delete-btn {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .delete-btn:hover {
            background: rgba(255, 68, 68, 0.4);
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.05) 0%, rgba(0, 150, 150, 0.05) 100%);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Notifications */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(0, 150, 150, 0.1) 100%);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            color: #00ffff;
            font-size: 12px;
            z-index: 999;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-color: rgba(0, 255, 0, 0.3);
            color: #00ff00;
        }

        .notification.error {
            border-color: rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Header Controls */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .user-info {
            color: #00ffff;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .search-filter {
                grid-template-columns: 1fr;
            }

            .control-panel {
                grid-template-columns: 1fr;
            }

            .keys-table {
                font-size: 10px;
            }

            .keys-table th,
            .keys-table td {
                padding: 8px;
            }

            .logo-text {
                font-size: 32px;
            }

            .header-controls {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Authentication Section -->
    <div id="authSection" class="auth-section active">
        <div class="auth-box">
            <h2>Admin Access</h2>
            <input type="password" id="adminKey" class="auth-input" placeholder="Enter Admin Key" />
            <button class="auth-button" onclick="authenticate()">Authenticate</button>
            <div id="authError" class="auth-error"></div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div style="display: flex; align-items: center; justify-content: center;">
                    <div class="logo-container">
                        <div class="logo-glow"></div>
                        <div class="logo-text">TOP EDIT SUITE</div>
                    </div>
                    <div class="firebase-status">
                        <span class="loading"></span> Firebase Connected
                    </div>
                </div>
                <div class="subtitle">License Administration Dashboard</div>
            </div>

            <!-- Header Controls -->
            <div class="header-controls">
                <div class="user-info">
                    Admin Mode Active
                </div>
                <button class="button logout" onclick="logout()">Logout</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalKeys">0</div>
                    <div class="stat-label">Total Keys</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="activeKeys">0</div>
                    <div class="stat-label">Active Keys</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="revokedKeys">0</div>
                    <div class="stat-label">Revoked Keys</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="generationLock">OFF</div>
                    <div class="stat-label">Generation Lock</div>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="control-panel">
                <!-- Create Single Key -->
                <div class="control-card">
                    <h3>Create Single Key</h3>
                    <div class="input-group">
                        <input type="text" id="singleKeyInput" class="input-field" placeholder="Custom key (optional)" />
                        <button class="button" onclick="createSingleKey()">Create</button>
                    </div>
                </div>

                <!-- Bulk Create -->
                <div class="control-card">
                    <h3>Bulk Create Keys</h3>
                    <div class="input-group">
                        <input type="number" id="bulkCount" class="input-field" placeholder="Number of keys" min="1" max="100" value="10" />
                        <button class="button" onclick="bulkCreateKeys()">Generate</button>
                    </div>
                </div>

                <!-- Generation Lock -->
                <div class="control-card">
                    <h3>Generation Lock</h3>
                    <div class="toggle-switch">
                        <label class="switch">
                            <input type="checkbox" id="lockToggle" onchange="toggleGenerationLock()" />
                            <span class="slider"></span>
                        </label>
                        <span id="lockStatus">Disabled</span>
                    </div>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="search-filter">
                <input type="text" id="searchInput" placeholder="Search keys..." onkeyup="filterKeys()" />
                <select id="statusFilter" onchange="filterKeys()">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="revoked">Revoked</option>
                </select>
                <input type="date" id="dateFilter" onchange="filterKeys()" />
            </div>

            <!-- Keys Table -->
            <div id="keysContainer">
                <table class="keys-table">
                    <thead>
                        <tr>
                            <th>Key</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Last Used</th>
                            <th>Uses</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="keysTableBody">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 40px;">Loading keys from Firebase...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

        ];

        let isAuthenticated = false;
        let generationLocked = false;
        let keys = [];
        let allKeys = [];

        // Authentication
        function authenticate() {
            const input = document.getElementById('adminKey');
            const error = document.getElementById('authError');
            
            if (input.value === ADMIN_KEY) {
                isAuthenticated = true;
                document.getElementById('authSection').classList.remove('active');
                document.getElementById('dashboard').classList.add('active');
                input.value = '';
                error.textContent = '';
                init();
            } else {
                error.textContent = 'Invalid admin key';
                input.value = '';
            }
        }

        function logout() {
            isAuthenticated = false;
            document.getElementById('authSection').classList.add('active');
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('adminKey').value = '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('adminKey').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') authenticate();
            });
        });

        // Initialize
        function init() {
            loadFromFirebase();
        }

        // Load from Firebase
        function loadFromFirebase() {
            const keysRef = database.ref('licenses/keys');
            keysRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    keys = Object.values(data);
                    allKeys = [...keys];
                } else {
                    initializeDefaultKeys();
                }
                updateStats();
                renderKeys();
            }, (error) => {
                showNotification('Error loading from Firebase: ' + error.message, 'error');
            });

            const configRef = database.ref('licenses/config');
            configRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.generationLocked !== undefined) {
                    generationLocked = data.generationLocked;
                    document.getElementById('lockToggle').checked = generationLocked;
                    document.getElementById('lockStatus').textContent = generationLocked ? 'Enabled' : 'Disabled';
                }
            });
        }

        // Initialize Default Keys
        function initializeDefaultKeys() {
            const keysRef = database.ref('licenses/keys');
            const updates = {};

            DEFAULT_KEYS.forEach((keyValue, idx) => {
                const keyId = 'key_' + idx;
                updates[keyId] = {
                    id: keyId,
                    key: keyValue,
                    status: 'active',
                    created: new Date().toISOString(),
                    lastUsed: null,
                    uses: 0
                };
            });

            keysRef.set(updates).then(() => {
                showNotification('Default keys initialized', 'success');
                loadFromFirebase();
            }).catch((error) => {
                showNotification('Error initializing keys: ' + error.message, 'error');
            });
        }

        // Generate Key
        function generateKey(customKey = null) {
            if (customKey) {
                return customKey;
            }
            const prefix = 'TOP_EDIT-LICENSE-';
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let suffix = '';
            for (let i = 0; i < 8; i++) {
                suffix += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return prefix + suffix;
        }

        // Create Single Key
        function createSingleKey() {
            if (generationLocked) {
                showNotification('Generation is locked', 'error');
                return;
            }

            const customInput = document.getElementById('singleKeyInput');
            const customKey = customInput.value.trim() || null;
            const newKeyValue = generateKey(customKey);

            const keysRef = database.ref('licenses/keys');
            const newKeyId = 'key_' + Date.now();

            keysRef.child(newKeyId).set({
                id: newKeyId,
                key: newKeyValue,
                status: 'active',
                created: new Date().toISOString(),
                lastUsed: null,
                uses: 0
            }).then(() => {
                customInput.value = '';
                showNotification('Key created successfully', 'success');
            }).catch((error) => {
                showNotification('Error creating key: ' + error.message, 'error');
            });
        }

        // Bulk Create Keys
        function bulkCreateKeys() {
            if (generationLocked) {
                showNotification('Generation is locked', 'error');
                return;
            }

            const count = parseInt(document.getElementById('bulkCount').value) || 10;
            if (count < 1 || count > 100) {
                showNotification('Enter a number between 1 and 100', 'error');
                return;
            }

            const keysRef = database.ref('licenses/keys');
            const updates = {};

            for (let i = 0; i < count; i++) {
                const newKeyId = 'key_' + (Date.now() + i);
                updates[newKeyId] = {
                    id: newKeyId,
                    key: generateKey(),
                    status: 'active',
                    created: new Date().toISOString(),
                    lastUsed: null,
                    uses: 0
                };
            }

            keysRef.update(updates).then(() => {
                showNotification(`${count} keys created successfully`, 'success');
            }).catch((error) => {
                showNotification('Error creating keys: ' + error.message, 'error');
            });
        }

        // Toggle Generation Lock
        function toggleGenerationLock() {
            generationLocked = document.getElementById('lockToggle').checked;
            const configRef = database.ref('licenses/config');
            configRef.update({ generationLocked: generationLocked }).then(() => {
                document.getElementById('lockStatus').textContent = generationLocked ? 'Enabled' : 'Disabled';
                updateStats();
            }).catch((error) => {
                showNotification('Error updating lock: ' + error.message, 'error');
            });
        }

        // Delete Key
        function deleteKey(id) {
            if (confirm('Are you sure you want to delete this key?')) {
                const keysRef = database.ref('licenses/keys/' + id);
                keysRef.remove().then(() => {
                    showNotification('Key deleted', 'success');
                }).catch((error) => {
                    showNotification('Error deleting key: ' + error.message, 'error');
                });
            }
        }

        // Revoke Key
        function revokeKey(id) {
            const key = keys.find(k => k.id === id);
            if (key) {
                const newStatus = key.status === 'active' ? 'revoked' : 'active';
                const keysRef = database.ref('licenses/keys/' + id);
                keysRef.update({ status: newStatus }).then(() => {
                    showNotification(`Key ${newStatus === 'active' ? 'restored' : 'revoked'}`, 'success');
                }).catch((error) => {
                    showNotification('Error updating key: ' + error.message, 'error');
                });
            }
        }

        // Copy to Clipboard
        function copyKey(keyValue) {
            navigator.clipboard.writeText(keyValue).then(() => {
                showNotification('Key copied to clipboard', 'success');
            });
        }

        // Render Keys
        function renderKeys() {
            const tbody = document.getElementById('keysTableBody');
            
            if (keys.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">No keys yet. Create one to get started.</td></tr>';
                return;
            }

            tbody.innerHTML = keys.map(key => `
                <tr>
                    <td><span class="key-value">${key.key}</span></td>
                    <td><span class="key-status status-${key.status}">${key.status}</span></td>
                    <td>${new Date(key.created).toLocaleDateString()}</td>
                    <td>${key.lastUsed ? new Date(key.lastUsed).toLocaleDateString() : 'Never'}</td>
                    <td>${key.uses || 0}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="copy-btn" onclick="copyKey('${key.key}')">Copy</button>
                            <button class="delete-btn" onclick="revokeKey('${key.id}')">${key.status === 'active' ? 'Revoke' : 'Restore'}</button>
                            <button class="delete-btn" onclick="deleteKey('${key.id}')" style="background: rgba(255, 100, 100, 0.2); border-color: rgba(255, 100, 100, 0.3);">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Filter Keys
        function filterKeys() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const date = document.getElementById('dateFilter').value;

            const filtered = allKeys.filter(key => {
                const matchSearch = key.key.toLowerCase().includes(search);
                const matchStatus = !status || key.status === status;
                const matchDate = !date || new Date(key.created).toLocaleDateString() === new Date(date).toLocaleDateString();
                return matchSearch && matchStatus && matchDate;
            });

            const tbody = document.getElementById('keysTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">No keys match your filters.</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(key => `
                <tr>
                    <td><span class="key-value">${key.key}</span></td>
                    <td><span class="key-status status-${key.status}">${key.status}</span></td>
                    <td>${new Date(key.created).toLocaleDateString()}</td>
                    <td>${key.lastUsed ? new Date(key.lastUsed).toLocaleDateString() : 'Never'}</td>
                    <td>${key.uses || 0}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="copy-btn" onclick="copyKey('${key.key}')">Copy</button>
                            <button class="delete-btn" onclick="revokeKey('${key.id}')">${key.status === 'active' ? 'Revoke' : 'Restore'}</button>
                            <button class="delete-btn" onclick="deleteKey('${key.id}')" style="background: rgba(255, 100, 100, 0.2); border-color: rgba(255, 100, 100, 0.3);">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Update Stats
        function updateStats() {
            const total = keys.length;
            const active = keys.filter(k => k.status === 'active').length;
            const revoked = keys.filter(k => k.status === 'revoked').length;

            document.getElementById('totalKeys').textContent = total;
            document.getElementById('activeKeys').textContent = active;
            document.getElementById('revokedKeys').textContent = revoked;
            document.getElementById('generationLock').textContent = generationLocked ? 'ON' : 'OFF';
        }

        // Notifications
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
    </script>
</body>
